        <!-- Form Section -->
        <section class="section-padding overflow-hidden">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="p-md-8 p-5 shadow rounded-4 bg-white bg-custom-1 wow img-custom-anim-top">
                            <div class="text-primary fw-normal fs-7 text-uppercase text-decoration-underline mb-3">Project Details</div>
                            <h2 class="fw-bold mb-5">Tell Us About Your Project</h2>
                            
                            <form id="getQuoteForm">
                                <!-- Budget Selector -->
                                <div class="mb-5 select-budget border-bottom pb-4">
                                    <label class="form-label text-dark fw-bold d-block mb-3">Select Project Budget</label>
                                    <div class="d-flex flex-wrap gap-3">
                                        <a href="javascript:void(0)" class="py-2 px-3 btn btn-outline-secondary active shadow fs-7">$100 - $500</a>
                                        <a href="javascript:void(0)" class="py-2 px-3 btn btn-outline-secondary fs-7">$1k - $5k</a>
                                        <a href="javascript:void(0)" class="py-2 px-3 btn btn-outline-secondary fs-7">$5k - $10k</a>
                                    </div>
                                </div>

                                <div class="row">
                                    <!-- Name Field -->
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label text-dark fw-bold">Your Name <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <i class="bi bi-person-fill text-dark d-flex bg-secondary-1 py-3 rounded-start-4 ps-3 align-items-center"></i>
                                            <input type="text" class="form-control border-0 rounded-end-4 bg-secondary-1" placeholder="Your name" required />
                                        </div>
                                    </div>

                                    <!-- Email Field -->
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label text-dark fw-bold">Email Address <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <i class="bi bi-envelope-fill text-dark d-flex bg-secondary-1 py-3 rounded-start-4 ps-3 align-items-center"></i>
                                            <input type="email" class="form-control border-0 rounded-end-4 bg-secondary-1" placeholder="info@" required />
                                        </div>
                                    </div>

                                    <!-- Phone Field -->
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label text-dark fw-bold">Phone Number</label>
                                        <div class="input-group">
                                            <i class="bi bi-telephone-fill text-dark d-flex bg-secondary-1 py-3 rounded-start-4 ps-3 align-items-center"></i>
                                            <input type="tel" class="form-control border-0 rounded-end-4 bg-secondary-1" placeholder="Phone" />
                                        </div>
                                    </div>

                                    <!-- Subject Field -->
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label text-dark fw-bold">Subject</label>
                                        <div class="input-group">
                                            <i class="bi bi-tag-fill text-dark d-flex bg-secondary-1 py-3 rounded-start-4 ps-3 align-items-center"></i>
                                            <input type="text" class="form-control border-0 rounded-end-4 bg-secondary-1" placeholder="Subject" />
                                        </div>
                                    </div>

                                    <!-- Description Field -->
                                    <div class="col-12 mb-4">
                                        <label class="form-label text-dark fw-bold">Describe Your Project <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <i class="bi bi-pencil-fill text-dark bg-secondary-1 rounded-start-4 pt-3 ps-3 d-flex align-items-start"></i>
                                            <textarea class="form-control border-0 rounded-end-4 bg-secondary-1 rounded-0 pb-10 pt-3" placeholder="Describe Your Project in Short" required></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 mt-4 text-end">
                                    <button type="submit" class="btn btn-dark px-5 py-3">Submit Request</button>
                                </div>
                            </form>
                        </div>
